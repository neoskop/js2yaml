name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "Joshua Garlisch"
          git config user.email "garlisch@neoskop.de"

      - name: Bump version
        run: npm version ${{ inputs.version }}

      - run: npm ci

      - name: Publish to npm
        run: npm publish

      - name: Push tag and version commit
        run: git push --follow-tags

      - name: Create GitHub release
        run: gh release create "v$(node -p 'require("./package.json").version')" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
